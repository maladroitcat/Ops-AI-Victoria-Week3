# GitHub Actions CD Pipeline

name: CD - Deploy to GKE

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: ops-ai-victoria
  GCP_ZONE: us-central1-a
  CLUSTER_NAME: operationalizing-ai
  ARTIFACT_REGISTRY_REGION: us-central1
  ARTIFACT_REGISTRY_REPO: docker-repo
  IMAGE_NAME: demand-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Install GKE auth plugin
      run: |
        gcloud --quiet components install gke-gcloud-auth-plugin

    - name: Get GKE cluster credentials
      run: |
        gcloud container clusters get-credentials ${{ env.CLUSTER_NAME }} \
          --zone ${{ env.GCP_ZONE }} \
          --project ${{ env.GCP_PROJECT_ID }}

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev --quiet

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./week2/starter/Dockerfile
        push: true
        platforms: linux/amd64
        tags: |
          ${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Update Deployment image
      run: |
        kubectl set image deployment/demand-api \
          demand-api=${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n default

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/demand-api \
          --timeout=12m \
          -n default

    - name: Debug rollout failure
      if: failure()
      run: |
        kubectl get deployment demand-api -n default
        kubectl get pods -n default -l app=demand-api -o wide
        kubectl describe deployment demand-api -n default
        kubectl describe pods -n default -l app=demand-api
        kubectl logs -n default deployment/demand-api --tail=200

    - name: Verify deployment
      run: |
        kubectl get pods -n default
        kubectl get svc demand-api -n default
